name: Deploy to GitHub Pages

on:
  push:
    branches: [reorganize]
    paths:
      - 'index.html'
      - 'proggie-index.html'
      - 'programs/AOL/proggies-sorted-deduped/**/*.html'
      - 'programs/AOL/proggies-sorted-deduped/**/*.png'
      - 'programs/AOL/proggies-sorted-deduped/**/*.gif'
      - 'programs/AOL/proggies-sorted-deduped/**/*.jpg'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect static site files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp proggie-index.html _site/
          # Copy all HTML + image assets, preserving directory structure
          cd programs/AOL/proggies-sorted-deduped
          find . \( -name "*.html" -o -name "*.png" -o -name "*.gif" -o -name "*.jpg" \) \
            -exec bash -c 'mkdir -p "../../../_site/programs/AOL/proggies-sorted-deduped/$(dirname "{}")" && cp "{}" "../../../_site/programs/AOL/proggies-sorted-deduped/{}"' \;

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
