name: Update Proggie List

on:
  push:
    paths:
      - 'programs/**/*.zip'
      - 'programs/**/*.rar'
  workflow_dispatch:  # Allows manual trigger
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC

jobs:
  update-list:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update proggie list
        run: |
          chmod +x ./update-proggie-list.sh
          ./update-proggie-list.sh
          
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet proggie-list-sorted.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in proggie list"
          fi
          
      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proggie-list-sorted.txt
          git commit -m "🤖 Auto-update proggie-list-sorted.txt"
          git push
