document.getElementById('total').textContent = proggies.length;
const versions = new Set();
const vbvers = new Set();
proggies.forEach(p => { versions.add(p.primary); if(p.vb_version) vbvers.add(p.vb_version); });
const vf = document.getElementById('version-filter');
Array.from(versions).sort().forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; vf.appendChild(o); });
const vbf = document.getElementById('vb-filter');
Array.from(vbvers).sort().forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; vbf.appendChild(o); });
function render(list) {
  const tb = document.getElementById('results');
  tb.innerHTML = '';
  list.forEach(p => {
    const r = tb.insertRow();
    r.insertCell(0).textContent = p.name;
    r.insertCell(1).textContent = p.author;
    const pc = r.insertCell(2); pc.textContent = p.platform; if(p.platform==='AIM') pc.className='aim';
    r.insertCell(3).textContent = p.primary;
    r.insertCell(4).textContent = p.vb_version || '';
    const ct = r.insertCell(5); ct.textContent = p.compile_type || ''; if(p.compile_type==='p-code') ct.style.color='#f0f';
    r.insertCell(6).textContent = p.file.split('/').pop();
    const pw = r.insertCell(7); pw.textContent = p.password; if(p.password) pw.className='password';
  });
  document.getElementById('showing').textContent = list.length;
}
function filter() {
  const s = document.getElementById('search').value.toLowerCase();
  const pf = document.getElementById('platform-filter').value;
  const vf = document.getElementById('version-filter').value;
  const vbf = document.getElementById('vb-filter').value;
  const cf = document.getElementById('compile-filter').value;
  render(proggies.filter(p =>
    (!s || p.name.toLowerCase().includes(s) || p.author.toLowerCase().includes(s) || p.file.toLowerCase().includes(s)) &&
    (!pf || p.platform === pf) &&
    (!vf || p.primary === vf) &&
    (!vbf || p.vb_version === vbf) &&
    (!cf || p.compile_type === cf)
  ));
}
document.getElementById('search').addEventListener('input', filter);
document.getElementById('platform-filter').addEventListener('change', filter);
document.getElementById('version-filter').addEventListener('change', filter);
document.getElementById('vb-filter').addEventListener('change', filter);
document.getElementById('compile-filter').addEventListener('change', filter);
render(proggies);
</script>
